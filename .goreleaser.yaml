version: 2
project_name: gnmi-mcp-server
builds:
  - env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: Howthemeaning
    name: gnmi-mcp-server
